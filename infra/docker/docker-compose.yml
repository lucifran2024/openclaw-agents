x-backend-env: &backend-env
  NODE_ENV: production
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: ${POSTGRES_DB:-omnichannel}
  DATABASE_USER: ${POSTGRES_USER:-postgres}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET: ${S3_BUCKET:-omnichannel}
  S3_REGION: ${S3_REGION:-us-east-1}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-test-key}
  BACKEND_PORT: 3001
  BACKEND_URL: ${BACKEND_URL:-http://127.0.0.1:3001}
  FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:3000}
  JWT_SECRET: ${JWT_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
  JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
  STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
  STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL:-}
  STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
  WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
  WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
  WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omnichannel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnichannel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: omnichannel-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: omnichannel-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  backend-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: omnichannel-backend-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend-env
    working_dir: /app/apps/backend
    command:
      [
        'sh',
        '-lc',
        '/app/node_modules/.bin/mikro-orm migration:up --config /app/apps/backend/mikro-orm.config.ts',
      ]
    restart: 'no'

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: omnichannel-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    environment: *backend-env
    ports:
      - '3001:3001'

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001/api/v1}
    container_name: omnichannel-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001/api/v1}
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres-data:
  redis-data:
  minio-data:
